<body>
    <h1>카카오 지도 API</h1>
    <!-- https://apis.map.kakao.com/web/guide/#ready -->
    <!-- 지도를 담을 div 태그 -->
    <div id="map" style="width:500px;height:400px;"></div>

    <!-- 카카오 지도 도구 불러오기 (라이브러리 포함) -->
    <script type="text/javascript"
        src="//dapi.kakao.com/v2/maps/sdk.js?appkey=b8a686e3cfe01dc8c42c3e6817af96e4&libraries=services,clusterer,drawing"></script>

    <script src="./kakao-map-api.js"></script>







    <!-- 라이브러리 추가 사용 -->
    <script type="text/javascript" src="//dapi.kakao.com/v2/maps/sdk.js?appkey=APIKEY&libraries=LIBRARY"></script>

    <!-- services 라이브러리 불러오기 -->
    <script type="text/javascript" src="//dapi.kakao.com/v2/maps/sdk.js?appkey=APIKEY&libraries=services"></script>

    <!-- services와 clusterer, drawing 라이브러리 불러오기 -->
    <script type="text/javascript"
        src="//dapi.kakao.com/v2/maps/sdk.js?appkey=APIKEY&libraries=services,clusterer,drawing"></script>
