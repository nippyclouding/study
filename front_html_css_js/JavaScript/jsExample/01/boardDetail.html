<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1> This is boardDetail </h1>
    <hr>

    <div id = "board_head_container">
      <span id="writer"></span><br>
      <span id="created_at"></span><br>  
    </div>

    <div id = "board_body_container">
        <span id="board_content"></span>
    </div>

    <button onclick="history.back()">이전 페이지</button>
    
    <!-- 
    <button> 태그는 자바 스크립트 함수 사용 시 사용하고
    <form> 태그의 button 속성은 서버에 데이터를 전달할 때의 버튼 용도로 사용한다.
    button onclick : button 태그의 속성 (정확히는 '이벤트 속성')
    history는 자바스크립트 객체 (사용자가 방문했던 페이지의 기록을 담는 객체)
    back() : 브라우저에서 '뒤로 가기' 역할 제공 
    -->

    <script src = "boardDetail.js"></script>
</body>
</html>
